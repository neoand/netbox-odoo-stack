global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Security Dashboard
  - job_name: 'security-dashboard'
    static_configs:
      - targets: ['localhost:9090']

  # NetBox Security Metrics
  - job_name: 'netbox-security'
    static_configs:
      - targets: ['netbox:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Wazuh SIEM Metrics
  - job_name: 'wazuh'
    static_configs:
      - targets: ['wazuh-manager:5000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Suricata IDS Metrics
  - job_name: 'suricata'
    static_configs:
      - targets: ['suricata:9001']
    metrics_path: '/stats'
    scrape_interval: 10s

  # OpenVAS (if has metrics endpoint)
  - job_name: 'openvas'
    static_configs:
      - targets: ['openvas:9392']
    scrape_interval: 60s
