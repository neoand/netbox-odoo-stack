version: '3.8'

services:
  # NetBox CMDB/IPAM
  netbox:
    image: netboxcommunity/netbox:v4.0-3.0
    container_name: netbox
    ports:
      - "8000:8080"
    environment:
      - DB_NAME=netbox
      - DB_USER=netbox
      - DB_PASSWORD=netbox123
      - DB_HOST=postgres
      - DB_PORT=5432
      - SECRET_KEY=secret-key-development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data/netbox-media:/opt/netbox/netbox/media
      - ./data/netbox-init:/opt/netbox/netbox/initializers
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: netbox-postgres
    environment:
      - POSTGRES_DB=netbox
      - POSTGRES_USER=netbox
      - POSTGRES_PASSWORD=netbox123
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: netbox-redis
    restart: unless-stopped

  # neo_stack Framework
  neo-stack:
    build:
      context: ./neo-stack
      dockerfile: Dockerfile
    container_name: neo-stack
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://netbox:netbox123@postgres:5432/neo_stack
      - REDIS_URL=redis://redis:6379/0
      - NETBOX_API=http://netbox:8080/api
      - ODOO_URL=http://odoo:8069
    depends_on:
      - postgres
      - redis
      - netbox
    volumes:
      - ./data/neo-stack:/app/data
    restart: unless-stopped

  # Odoo ERP
  odoo:
    image: odoo:17
    container_name: odoo
    ports:
      - "8069:8069"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=netbox
      - DB_PASSWORD=netbox123
      - DB_NAME=odoo
    depends_on:
      - postgres
    volumes:
      - ./data/odoo-addons:/mnt/extra-addons
      - ./data/odoo-data:/var/lib/odoo
    restart: unless-stopped

  # Documentation Server
  docs:
    image: python:3.11-slim
    container_name: netbox-docs
    ports:
      - "8080:8000"
    working_dir: /docs
    volumes:
      - ..:/docs
    command: bash -c "pip install mkdocs mkdocs-material && mkdocs serve --dev-addr 0.0.0.0:8000"
    restart: unless-stopped

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  default:
    driver: bridge

volumes:
  postgres_data:
  netbox_data:
  neo_stack_data:
  odoo_data:
